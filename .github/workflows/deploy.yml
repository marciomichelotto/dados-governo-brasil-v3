name: Deploy Dados Governo v3

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  validate:
    name: Validate dbt and SQL quality gates
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dbt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dbt and SQL lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-snowflake sqlfluff sqlfluff-templater-dbt

      - name: Check dbt installation
        run: dbt --version

      - name: Compile dbt models
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/.github/dbt
        run: dbt compile --profiles-dir "$DBT_PROFILES_DIR"

      - name: Run dbt tests on Silver
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/.github/dbt
        run: dbt test --select silver --profiles-dir "$DBT_PROFILES_DIR"

      - name: Lint SQL models
        run: sqlfluff lint .

  deploy:
    name: Deploy Gold dbt models
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: dbt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dbt Snowflake adapter
        run: |
          python -m pip install --upgrade pip
          pip install dbt-snowflake

      - name: Deploy Gold models
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/.github/dbt
        run: dbt run --select gold --profiles-dir "$DBT_PROFILES_DIR"
