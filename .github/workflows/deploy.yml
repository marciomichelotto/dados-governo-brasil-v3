name: Deploy Dados Governo v3

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  deploy:
    name: Validate and Deploy dbt models
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dbt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dbt Snowflake adapter
        run: |
          python -m pip install --upgrade pip
          pip install dbt-snowflake

      - name: Check dbt installation
        run: dbt --version

      - name: Validate project structure
        run: dbt parse

      - name: Run dbt tests
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/.github/dbt
        run: dbt test --profiles-dir "$DBT_PROFILES_DIR"

      - name: Deploy Gold models
        if: github.ref == 'refs/heads/main'
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/.github/dbt
        run: dbt run --select gold --profiles-dir "$DBT_PROFILES_DIR"
