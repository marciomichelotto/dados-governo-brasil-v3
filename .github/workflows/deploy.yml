# =============================================================================
# .github/workflows/deploy.yml
# Projeto  : dados-governo-brasil-v3
# Autor    : Marcio Michelotto
#
# FLUXO DO PIPELINE:
#
#   [push / PR]
#       │
#       ▼
#   ┌─────────────┐
#   │   VALIDATE  │  ← roda em TODO push (qualquer branch)
#   │             │    • sqlfluff lint  (SQL)
#   │             │    • dbt compile    (YAML + Jinja válidos)
#   │             │    • dbt test       (qualidade dos dados)
#   └──────┬──────┘
#          │  só continua se VALIDATE passou
#          ▼
#   ┌─────────────┐
#   │   DEPLOY    │  ← roda SOMENTE em push para main
#   │             │    • executa SQLs de setup via SnowSQL
#   │             │    • chama as Stored Procedures
#   │             │    • ativa as Tasks de orquestração
#   └─────────────┘
#
# POR QUE SEPARAR VALIDATE E DEPLOY?
#   Continuous Integration = qualquer branch é validada automaticamente.
#   Continuous Delivery    = só main chega em produção, e só após validação.
#   Sem essa separação, um SQL inválido pode chegar direto em prod.
# =============================================================================

name: CI/CD — Dados Governo Brasil

on:
  push:
    branches:
      - main
      - 'feature/**'     # valida qualquer feature branch
      - 'fix/**'
  pull_request:
    branches:
      - main             # valida PRs antes do merge

# Cancela runs anteriores do mesmo branch/PR para economizar minutos do Actions
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =============================================================================
# VARIÁVEIS GLOBAIS
# Credenciais sensíveis ficam em GitHub Secrets (Settings → Secrets → Actions)
# Nunca hardcode de credenciais no código!
# =============================================================================
env:
  SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}    # ex: MKQAYBK-CK27934
  SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}       # ex: MARCIOMICHELOTTO
  SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
  SNOWFLAKE_DATABASE:  ${{ secrets.SNOWFLAKE_DATABASE }}   # ex: DADOS_GOVERNO
  SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}  # ex: COMPUTE_WH
  SNOWFLAKE_SCHEMA:    ${{ secrets.SNOWFLAKE_SCHEMA }}     # ex: PUBLIC
  SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}       # ex: SYSADMIN
  DBT_PROFILES_DIR:    ${{ github.workspace }}/dbt         # onde está o profiles.yml

# =============================================================================
# JOB 1: VALIDATE
# Roda em qualquer branch. É a "porta de qualidade" do projeto.
# O deploy só acontece se este job passar com sucesso.
# =============================================================================
jobs:
  validate:
    name: 🔍 Validação (SQL Lint + dbt compile + dbt test)
    runs-on: ubuntu-latest

    steps:

      # -----------------------------------------------------------------------
      # 1. Checkout do repositório
      # -----------------------------------------------------------------------
      - name: Checkout do código
        uses: actions/checkout@v5

      # -----------------------------------------------------------------------
      # 2. Configura Python (necessário para dbt e sqlfluff)
      # -----------------------------------------------------------------------
      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'             # cacheia dependências entre runs

      # -----------------------------------------------------------------------
      # 3. Instala dependências
      # -----------------------------------------------------------------------
      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install \
            dbt-snowflake==1.8.* \
            sqlfluff==3.* \
            sqlfluff-templater-dbt==3.*

      # -----------------------------------------------------------------------
      # 4. Gera profiles.yml dinamicamente a partir dos Secrets
      #    Nunca commite o profiles.yml com credenciais reais!
      # -----------------------------------------------------------------------
      - name: Gerar dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          dados_governo:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: ${SNOWFLAKE_ACCOUNT}
                user: ${SNOWFLAKE_USER}
                password: '${SNOWFLAKE_PASSWORD}'
                role: ${SNOWFLAKE_ROLE}
                database: ${SNOWFLAKE_DATABASE}
                warehouse: ${SNOWFLAKE_WAREHOUSE}
                schema: ${SNOWFLAKE_SCHEMA}
                threads: 4
                client_session_keep_alive: false
          EOF

      # -----------------------------------------------------------------------
      # 5. Instala pacotes dbt (dbt-utils e outros do packages.yml)
      # -----------------------------------------------------------------------
      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      # -----------------------------------------------------------------------
      # 6. SQL Lint — valida estilo e sintaxe dos arquivos SQL
      #    sqlfluff detecta problemas como: aliases sem AS, SELECT *,
      #    indentação inconsistente, palavras reservadas em minúsculo, etc.
      # -----------------------------------------------------------------------
      - name: SQL Lint (sqlfluff)
        run: |
          sqlfluff lint snowflake/ \
            --dialect snowflake \
            --exclude-rules L034,L031 \
            --format github-annotation \
            --annotation-level warning
        continue-on-error: true   # não quebra o build por style, só por erros graves
        # Para tornar o lint obrigatório (recomendado no futuro),
        # remova o continue-on-error acima.

      # -----------------------------------------------------------------------
      # 7. dbt compile — valida sintaxe SQL e Jinja de todos os modelos
      #    Não executa nada no Snowflake, apenas compila localmente.
      #    Detecta: referências quebradas, YAML malformado, macros inválidas.
      # -----------------------------------------------------------------------
      - name: dbt compile
        working-directory: dbt
        run: |
          dbt compile \
            --profiles-dir ~/.dbt \
            --project-dir . \
            --select gold

      # -----------------------------------------------------------------------
      # 8. dbt test — executa os testes de qualidade definidos no schema.yml
      #    Requer conexão com Snowflake (usa as credenciais dos Secrets).
      #    Testa: not_null, unique, accepted_values, expression_is_true.
      #
      #    NOTA: se o Snowflake não estiver acessível no CI (ex: conta expirada),
      #    comente este step temporariamente e mantenha apenas o dbt compile.
      # -----------------------------------------------------------------------
      - name: dbt test (qualidade dos dados)
        working-directory: dbt
        run: |
          dbt test \
            --profiles-dir ~/.dbt \
            --project-dir . \
            --select gold \
            --store-failures          # salva registros que falharam para debug

      # -----------------------------------------------------------------------
      # 9. Publica o resultado dos testes como sumário do workflow
      # -----------------------------------------------------------------------
      - name: Sumário da validação
        if: always()
        run: |
          echo "## 🔍 Resultado da Validação" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Autor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Data:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY


# =============================================================================
# JOB 2: DEPLOY
# Só roda em push para main E somente se o job validate passou.
# Executa os SQLs no Snowflake via SnowSQL CLI.
# =============================================================================
  deploy:
    name: 🚀 Deploy (Snowflake)
    runs-on: ubuntu-latest
    needs: validate                     # ← DEPENDE do validate passar
    if: github.ref == 'refs/heads/main' # ← SÓ na branch main

    environment:
      name: production                  # requer aprovação manual se configurado

    steps:

      - name: Checkout do código
        uses: actions/checkout@v5

      # -----------------------------------------------------------------------
      # Instala SnowSQL CLI para executar os arquivos SQL no Snowflake
      # -----------------------------------------------------------------------
      - name: Instalar SnowSQL
        run: |
          curl -o snowsql.bash \
            https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.3/linux_x86_64/snowsql-1.3.1-linux_x86_64.bash
          bash snowsql.bash

      # -----------------------------------------------------------------------
      # Configura variáveis de ambiente para o SnowSQL
      # -----------------------------------------------------------------------
      - name: Configurar SnowSQL
        run: |
          mkdir -p ~/.snowsql
          cat > ~/.snowsql/config << EOF
          [connections.ci]
          accountname = ${SNOWFLAKE_ACCOUNT}
          username = ${SNOWFLAKE_USER}
          password = '${SNOWFLAKE_PASSWORD}'
          dbname = ${SNOWFLAKE_DATABASE}
          warehousename = ${SNOWFLAKE_WAREHOUSE}
          schemaname = ${SNOWFLAKE_SCHEMA}
          rolename = ${SNOWFLAKE_ROLE}
          EOF
          chmod 600 ~/.snowsql/config

      # -----------------------------------------------------------------------
      # Deploy das Stored Procedures (Bronze → Silver → Gold)
      # Ordem importa: procedures antes das tasks
      # -----------------------------------------------------------------------
      - name: Deploy — Stored Procedures
        run: |
          snowsql -c ci -f snowflake/procedures/sp_bronze_load.sql
          snowsql -c ci -f snowflake/procedures/sp_silver_clean.sql

      # -----------------------------------------------------------------------
      # Deploy das Tasks de orquestração
      # -----------------------------------------------------------------------
      - name: Deploy — Tasks (orquestração)
        run: |
          snowsql -c ci -f snowflake/tasks/orchestration.sql

      # -----------------------------------------------------------------------
      # Deploy dos modelos dbt (Gold)
      # -----------------------------------------------------------------------
      - name: Setup Python para dbt
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dbt
        run: pip install dbt-snowflake==1.8.*

      - name: Gerar dbt profiles.yml (deploy)
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          dados_governo:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: ${SNOWFLAKE_ACCOUNT}
                user: ${SNOWFLAKE_USER}
                password: ${SNOWFLAKE_PASSWORD}
                role: ${SNOWFLAKE_ROLE}
                database: ${SNOWFLAKE_DATABASE}
                warehouse: ${SNOWFLAKE_WAREHOUSE}
                schema: GOLD
                threads: 4
          EOF

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt run (modelos Gold)
        working-directory: dbt
        run: |
          dbt run \
            --profiles-dir ~/.dbt \
            --project-dir . \
            --select gold \
            --target prod

      # -----------------------------------------------------------------------
      # Sumário final do deploy
      # -----------------------------------------------------------------------
      - name: Sumário do deploy
        if: always()
        run: |
          echo "## 🚀 Deploy em Produção" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Data:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Ambiente:** Snowflake / ${SNOWFLAKE_DATABASE}" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# SECRETS NECESSÁRIOS (configurar em Settings → Secrets → Actions):
#
#   SNOWFLAKE_ACCOUNT    → ex: MKQAYBK-CK27934
#   SNOWFLAKE_USER       → ex: MARCIOMICHELOTTO
#   SNOWFLAKE_PASSWORD   → sua senha do Snowflake
#   SNOWFLAKE_DATABASE   → ex: DADOS_GOVERNO
#   SNOWFLAKE_WAREHOUSE  → ex: COMPUTE_WH
#   SNOWFLAKE_SCHEMA     → ex: PUBLIC
#   SNOWFLAKE_ROLE       → ex: SYSADMIN
#
# COMO TESTAR LOCALMENTE (sem GitHub Actions):
#   act -j validate    # requer: brew install act
# =============================================================================
